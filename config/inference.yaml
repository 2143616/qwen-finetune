# ============================================================
# LLaMA-Factory 推理配置文件
# 使用微调后的 LoRA 权重进行对话推理
# ============================================================

model_name_or_path: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true

adapter_name_or_path: output/qwen-qlora-financial

finetuning_type: lora
quantization_bit: 4

template: qwen
cutoff_len: 2048

infer_backend: huggingface
# infer_backend: vllm                 # 如已安装 vLLM 可切换为更快推理

# 推理参数
temperature: 0.7
top_p: 0.9
top_k: 50
repetition_penalty: 1.05
max_new_tokens: 1024
